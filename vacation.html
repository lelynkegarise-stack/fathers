<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css?v=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="logo1.png">
  <link rel="apple-touch-icon" href="logo1.png">  
  <title>Vacation Scrapbook Viewer</title>
</head>
<body>

  <!-- 1. Navbar Container -->
  <div id="navbar"></div>
  <script>
    fetch("navbar.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
      });
  </script>

  <!-- 2. Clean Scrapbook Canvas (No preview cards allowed here!) -->
  <main class="scrapbook-bg">
    <section class="scrapbook-section">
        <h2 id="vacation-heading" class="section-heading">✈️ Vacation Memories</h2>
        
        <!-- The polaroids drop neatly right here without getting pushed down -->
        <div id="scrapbook-gallery" class="scrapbook-flex"></div>
    </section>

    <!-- Pagination Module -->
    <div class="pagination" id="pagination-controls">
        <button id="prev-btn" class="page-btn">« Previous</button>
        <span id="page-indicator" class="current-page">Page 1</span>
        <button id="next-btn" class="page-btn">Next »</button>
    </div>

    <!-- Back Navigation to Index Hub -->
    <div style="text-align: center; margin-top: 30px; margin-bottom: 50px;">
        <a href="vacationIndex.html" class="page-btn" style="text-decoration: none; display: inline-block;">← Back to All Trips</a>
    </div>
  </main>

  <!-- 3. Footer Container -->
  <div id="footer"></div>
  <script>
    fetch("footer.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>

  <!-- 4. Core JavaScript Engine -->
  <script src="scrapbook.js"></script>

</body>
</html>
