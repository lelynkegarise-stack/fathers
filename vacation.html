<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css?v=1.0">
  <title>Vacation Scrapbook Viewer</title>
</head>
<body>

  <div id="navbar"></div>

  <!-- This section is always visible on this page because its only job is to show the trip -->
  <section class="scrapbook-section" style="padding: 40px 20px;">
    <h2 id="vacation-heading" style="text-align: center; color: #2c3e50;">✈️ Vacation Memories</h2>
    
    <!-- Your scrapbook.js will inject the photos/videos here -->
    <div id="scrapbook-gallery" class="scrapbook-flex"></div>
    
    <div class="pagination" id="pagination-controls" style="display: none;">
        <button id="prev-btn" class="page-btn">« Previous</button>
        <span id="page-indicator" class="current-page">Page 1</span>
        <button id="next-btn" class="page-btn">Next »</button>
    </div>
    
    <div style="text-align: center; margin-top: 30px; margin-bottom: 50px;">
        <!-- Fixed link to point back to your main landing index -->
        <a href="index.html" class="page-btn" style="text-decoration: none; display: inline-block;">← Back to All Trips</a>
    </div>
  </section>

  <div id="footer"></div>

  <script>
    ['navbar', 'footer'].forEach(id => {
      fetch(`${id}.html`)
        .then(res => res.text())
        .then(data => document.getElementById(id).innerHTML = data);
    });
  </script>
  <!-- Your logic script that reads URL parameters and fetches the right album -->
  <script src="scrapbook.js"></script>
</body>
</html>
