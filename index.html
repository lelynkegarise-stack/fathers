<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css?v=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="logo1.png">
<link rel="apple-touch-icon" href="logo1.png">  
  <title>Brads the Man</title>
</head>

<body>

  <!-- Navbar -->
<div id="navbar"></div>
<script>

fetch("navbar.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });

</script>
  <!-- ===== Intro Section ===== -->
  <div class="intro">
    <h1>
     The Man, The Myth, The Legand<br>
    </h1>
    <h3> Brad Kegarise </h3>
          <img src="Brad.png" alt="picture of braf" class="logo1">

  </div>
 <div class="timeline-container">
  <div class="timeline-track">
    
    <!-- Step 1 -->
    <div class="timeline-node">
      <div class="node-dot"></div>
      <div class="node-info">
        <span class="node-date">June 2022</span>
        <h3>Project Kickoff</h3>
        <p>Initial brainstorming and core design began.</p>
      </div>
    </div>

    <!-- Step 2 -->
    <div class="timeline-node">
      <div class="node-dot"></div>
      <div class="node-info">
        <span class="node-date">May 2025</span>
        <h3>Beta Release</h3>
        <p>Launched the application to our first 500 users.</p>
      </div>
    </div>

    <!-- Step 3 -->
    <div class="timeline-node">
      <div class="node-dot"></div>
      <div class="node-info">
        <span class="node-date">Feb 2026</span>
        <h3>UI Redesign</h3>
        <p>Migrated to a fully responsive layout framework.</p>
      </div>
    </div>

  </div>
</div>
  <!-- Footer -->
  <div id="footer"></div>

  <script>
    fetch("footer.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>
<script src="style.js"></script>
</body>
</html>
