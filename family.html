<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css?v=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="logo1.png">
  <link rel="apple-touch-icon" href="logo1.png">  
  <title>Dad's Scrapbook - Page 1</title>
</head>

<body>

  <!-- 1. Navbar Container & Fetch Script -->
  <div id="navbar"></div>
  <script>
    fetch("navbar.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
      });
  </script>

 <!-- Inside your single family.html file -->
<main class="scrapbook-bg">
    <section class="scrapbook-section">
        <h2 class="section-heading">🏠 Family Memories</h2>
        
        <!-- This stays the same -->
        <div id="family-gallery" class="scrapbook-flex"></div>
    </section>

    <!-- UPDATED PAGINATION: Buttons that trigger JS functions -->
    <div class="pagination">
        <button id="prev-btn" class="page-btn" onclick="goToPage(1)">« Page 1</button>
        <span id="page-indicator" class="current-page">Page 1</span>
        <button id="next-btn" class="page-btn" onclick="goToPage(2)">Page 2 »</button>
    </div>
</main>

  <!-- 3. Footer Container & Fetch Script -->
  <div id="footer"></div>
  <script>
    fetch("footer.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>

  <!-- 4. Global JavaScript File Links -->
  <script src="scrapbook.js"></script>
  <script src="style.js"></script>

</body>
</html>
