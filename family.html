<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css?v=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="logo1.png">
<link rel="apple-touch-icon" href="logo1.png">  
  <title>Brads Family/title>
</head>

<body>

  <!-- Navbar -->
<div id="navbar"></div>
<script>

fetch("navbar.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });

</script>
 <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dad's Scrapbook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Empty containers that JavaScript will fill with photos -->
    <main class="scrapbook-bg">
        <section class="scrapbook-section">
            <h2 class="section-heading">🏠 Family Memories</h2>
            <div id="family-gallery" class="scrapbook-flex"></div>
        </section>
    <!-- Link your JavaScript file at the very bottom -->
    <script src="scrapbook.js"></script>

  <!-- Footer -->
  <div id="footer"></div>

  <script>
    fetch("footer.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>
<script src="style.js"></script>
</body>
</html>
