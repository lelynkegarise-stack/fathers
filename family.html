<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css?v=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="logo1.png">
  <link rel="apple-touch-icon" href="logo1.png">  
  <title>Family Scrapbook</title>
</head>

<body>

  <!-- 1. Navbar Container & Fetch Script -->
  <div id="navbar"></div>
  <script>
    fetch("navbar.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
      });
  </script>

  <main class="scrapbook-bg">
    <!-- This section wrapper MUST be here so the script can show/hide it -->
    <section class="scrapbook-section">
        <h2 id="vacation-heading" class="section-heading">🏠 Family Memories</h2>
        
        <!-- FIXED ID: Must be scrapbook-gallery -->
        <div id="scrapbook-gallery" class="scrapbook-flex"></div>
    </section>

    <!-- FIXED ID: Must be pagination-controls -->
    <div class="pagination" id="pagination-controls">
        <button id="prev-btn" class="page-btn">« Previous</button>
        <span id="page-indicator" class="current-page">Page 1</span>
        <button id="next-btn" class="page-btn">Next »</button>
    </div>
  </main>

  <!-- 3. Footer Container & Fetch Script -->
  <div id="footer"></div>
  <script>
    fetch("footer.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>

  <!-- 4. Global JavaScript File Links -->
  <script src="scrapbook.js"></script>

  <!-- 5. FORCE JAVASCRIPT TO LOAD FAMILY MEMORIES -->
  <script>
    // This injects the key your scrapbook.js script needs if it's missing from the URL bar!
    const urlParams = new URLSearchParams(window.location.search);
    if (!urlParams.get('trip')) {
      window.currentTrip = 'family'; 
      // If your script uses a setup function to start, we force-trigger it here:
      if (typeof renderScrapbook === 'function') {
        renderScrapbook('family');
      } else if (typeof loadImages === 'function') {
        loadImages('family');
      }
    }
  </script>

</body>
</html>
